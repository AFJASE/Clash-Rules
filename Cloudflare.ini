;2、策略组
custom_proxy_group=AI`select`[]EXCEPT HK`[]SG`[]TW`[]HK`[]JP&KR`[]DIRECT
custom_proxy_group=Apple`select`[]EXCEPT HK`[]SG`[]TW`[]JP&KR`[]HK`[]DIRECT
custom_proxy_group=Bilibili`select`[]DIRECT`[]HK`[]TW
custom_proxy_group=Bahamut`select`[]HK`[]TW`[]DIRECT
custom_proxy_group=Crunchyroll`select`[]EXCEPT HK`[]HK`[]TW`[]SG`[]JP&KR`[]OTR`[]DIRECT
custom_proxy_group=Blocked Website`select`[]FASTEST`[]HK`[]EXCEPT HK`[]TW`[]SG`[]JP&KR`[]US`[]OTR`[]DIRECT
custom_proxy_group=Others`select`[]DIRECT`[]FASTEST`[]HK`[]EXCEPT HK`[]TW`[]SG`[]JP&KR`[]US`[]OTR

;3、节点组
custom_proxy_group=FASTEST`url-test`.*`http://captive.apple.com`180,,1
custom_proxy_group=EXCEPT HK`url-test`(Taiwan|Singapore|Korea|Japan|States|TW|SG|KR|JP|US)`http://captive.apple.com`180,,1
custom_proxy_group=HK`url-test`(Kong|HK)`http://captive.apple.com`180,,1
custom_proxy_group=TW`url-test`(Taiwan|TW)`http://captive.apple.com`180,,1
custom_proxy_group=SG`url-test`(Singapore|SG)`http://captive.apple.com`180,,1
custom_proxy_group=JP&KR`url-test`(Japan|JP|Korea|KR)`http://captive.apple.com`180,,1
custom_proxy_group=US`url-test`(States|US)`http://captive.apple.com`180,,1
custom_proxy_group=OTR`select`(?=.*())^((?!(Kong|HK|Taiwan|TW|Singapore|SG|Japan|JP|Korea|KR|States|US)).)*$`http://captive.apple.com`180,,1

;4、启用规则集
enable_rule_generator=true
overwrite_original_rules=true
